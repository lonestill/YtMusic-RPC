name: Build & Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  release:
    if: "!startsWith(github.event.head_commit.message, 'chore: bump')"
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Determine version
        id: version
        run: |
          $current = node -p "require('./package.json').version"
          $tag = git tag --list "v$current"
          if ($tag) {
            # tag already exists — bump patch
            npm version patch --no-git-tag-version
            $current = node -p "require('./package.json').version"
          }
          echo "version=$current" >> $env:GITHUB_OUTPUT

      - name: Commit & tag version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git diff --staged --quiet || git commit -m "chore: bump version to v${{ steps.version.outputs.version }}"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin master --follow-tags

      - name: Build & package
        run: npm run package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            dist/**/*.exe
            dist/**/*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
